name: Release Check

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-flyway-check:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.29
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Prepare Database
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS simple_chat_ci DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Flyway Migrate On Empty CI Schema
        run: |
          mvn -f imchat-server/pom.xml -P release-check -Dimchat.flyway.name=simple_chat_ci flyway:migrate

      - name: Maven Release Check
        run: mvn -pl imchat-server -am -P release-check -Dimchat.flyway.name=simple_chat_ci verify
