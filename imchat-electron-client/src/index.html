<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMChat Electron Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient-layer"></div>
    <div class="ambient-grid"></div>

    <main class="workspace">
      <section id="loginCard" class="surface login-surface">
        <div class="login-head">
          <p class="eyebrow">IMCHAT</p>
          <h1 class="brand">Secure Messaging</h1>
          <p class="subline">Electron Desktop Console</p>
        </div>

        <div class="auth-switch">
          <button id="loginModeBtn" class="auth-tab active" type="button">登录</button>
          <button id="registerModeBtn" class="auth-tab" type="button">注册</button>
        </div>

        <form id="loginForm" class="login-form">
          <label class="field">
            <span>用户名</span>
            <input id="usernameInput" type="text" required placeholder="请输入用户名" />
          </label>
          <label class="field">
            <span>密码</span>
            <input id="passwordInput" type="password" required placeholder="请输入密码" />
          </label>
          <label id="confirmPasswordField" class="field hidden-field">
            <span>确认密码</span>
            <input id="confirmPasswordInput" type="password" placeholder="请再次输入密码" />
          </label>

          <div class="captcha-row">
            <label class="field captcha-field">
              <span>验证码</span>
              <input id="captchaInput" type="text" required placeholder="输入验证码" />
            </label>
            <button id="refreshCaptchaBtn" class="btn ghost" type="button">刷新</button>
          </div>

          <div class="captcha-box">
            <img id="captchaImage" class="captcha-image" alt="captcha" />
          </div>

          <button id="authSubmitBtn" class="btn primary" type="submit">登录</button>
          <p id="loginError" class="error-text"></p>
        </form>

        <div class="auth-helper">
          <span id="switchModeText">还没有账号？</span>
          <button id="switchModeBtn" class="helper-link" type="button">立即注册</button>
        </div>
      </section>

      <section id="chatApp" class="client-shell hidden">
        <header class="surface topbar">
          <div class="title-block">
            <p class="eyebrow">IMCHAT DESKTOP</p>
            <h2>Unified Communication Hub</h2>
          </div>
          <p id="appHint" class="hint-text"></p>
        </header>

        <section class="content-grid">
          <aside class="surface sidebar">
            <div class="panel-label">账号信息</div>
            <div class="identity-card">
              <div class="avatar-token" id="selfAvatar">ME</div>
              <div class="identity-meta">
                <div id="selfNickname" class="nickname">-</div>
                <div id="selfUsername" class="username">-</div>
              </div>
            </div>

            <div class="search-row">
              <input id="searchInput" type="text" placeholder="搜索用户并发起好友申请" />
              <button id="searchBtn" class="btn compact">搜索</button>
            </div>
            <div id="searchResult" class="list compact-list"></div>

            <div class="panel-label">好友列表</div>
            <div id="friendList" class="list"></div>

            <div class="panel-label">最近会话</div>
            <div id="conversationList" class="list"></div>
          </aside>

          <section class="surface chat-main">
            <div id="chatHeader" class="chat-header">请选择一个好友开始聊天</div>
            <div id="messageList" class="message-list"></div>
            <div class="composer">
              <textarea id="messageInput" rows="3" placeholder="输入消息，点击发送"></textarea>
              <button id="sendBtn" class="btn primary">发送</button>
            </div>
          </section>

          <aside class="surface control-panel">
            <div class="panel-label">好友申请</div>
            <div id="applyList" class="list"></div>

            <div class="panel-label">会话控制</div>
            <button id="markReadBtn" class="btn ghost full">标记当前会话已读</button>
            <button id="refreshAllBtn" class="btn ghost full">刷新好友与会话</button>
            <button id="logoutBtn" class="btn danger full">退出登录</button>
          </aside>
        </section>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
