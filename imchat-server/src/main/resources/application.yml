# 服务配置
server:
  port: 8080
  servlet:
    context-path: /api

# Spring配置
spring:
  application:
    name: imchat-server
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${IMCHAT_DB_HOST:localhost}:${IMCHAT_DB_PORT:3306}/${IMCHAT_DB_NAME:simple_chat}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    # 仓库内仅保留示例密文；本地请优先通过环境变量覆盖，或替换为你自己生成的 ENC(...)
    username: ENC(UoLR6pBbR2d1WFPtZUchSRwH/PH+t88aBybA/oIwQnbUlv6EnORhpa8HImz40bbq)
    password: ENC(YNqe7x4vYX5+SPooA3i/GMBmjPwwMNRGi7Uiy+8sp+peS65DadQENs2SBw8nGeEl)
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      idle-timeout: 600000
      maximum-pool-size: 10
      auto-commit: true
      pool-name: HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: true
    validate-on-migrate: true
    table: flyway_schema_history

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.wjh.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  # 同上，建议本地通过 JWT_SECRET 环境变量覆盖
  secret: ENC(KZgDKy0L7DnrTqJsUDTR09TO+cqrTCuaIWwWa9bhX3UfNt8dpOE4iXYJsZ5FzfDVhglQ77JE6BBINleMOvjECA==)
  expiration: 7200000 # 2小时，单位毫秒
  refresh-expiration: 604800000 # 7天，单位毫秒

# Netty配置
netty:
  port: 9000
  websocket-path: /ws
  boss-threads: 1
  worker-threads: 4

# 项目自定义配置
imchat:
  # 验证码有效期（分钟）
  captcha-expire: 5
  # 文件上传路径
  upload-path: ./upload/
  # 静态资源访问路径
  static-path: /static/**
